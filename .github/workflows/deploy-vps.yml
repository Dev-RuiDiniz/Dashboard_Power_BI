name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify workspace metadata
        run: pnpm verify:workspace

      - name: Verify docs
        run: pnpm verify:docs

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.prod.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dashboard-power-bi-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/dashboard-power-bi-api:main

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.prod.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository_owner }}/dashboard-power-bi-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/dashboard-power-bi-web:main

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ secrets.VPS_DEPLOY_PATH }}"
            if [ ! -d "${{ secrets.VPS_DEPLOY_PATH }}/.git" ]; then
              git clone "https://github.com/${{ github.repository }}.git" "${{ secrets.VPS_DEPLOY_PATH }}"
            fi
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            export GHCR_NAMESPACE="ghcr.io/${{ github.repository_owner }}"
            export IMAGE_TAG="${{ github.sha }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ github.token }}"
            docker compose --env-file infra/env/.env.production -f infra/docker/docker-compose.prod.yml pull
            docker compose --env-file infra/env/.env.production -f infra/docker/docker-compose.prod.yml up -d
            docker compose --env-file infra/env/.env.production -f infra/docker/docker-compose.prod.yml ps
            docker image prune -f
