services:
  sqlserver:
    build:
      context: ../..
      dockerfile: infra/docker/sqlserver.Dockerfile
    container_name: dashboard-power-bi-sqlserver-demo
    env_file:
      - ../env/.env.demo
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      SQLSERVER_DATABASE: ${SQLSERVER_DATABASE:-DashboardPowerBI}
    ports:
      - '${SQLSERVER_PORT:-1433}:1433'
    healthcheck:
      test:
        ['CMD-SHELL', 'sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q "SELECT 1" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - dashboard-power-bi-demo

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: dashboard-power-bi-api-demo
    command: sh -lc "cd apps/api && pnpm exec nest start --watch"
    env_file:
      - ../env/.env.demo
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3001}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      SQLSERVER_HOST: sqlserver
    ports:
      - '${API_PORT:-3001}:3001'
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - dashboard-power-bi-demo

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    container_name: dashboard-power-bi-web-demo
    command: sh -lc "cd apps/web && pnpm exec next dev"
    env_file:
      - ../env/.env.demo
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_USE_MOCK_DATA: ${NEXT_PUBLIC_USE_MOCK_DATA:-true}
    ports:
      - '${WEB_PORT:-3000}:3000'
    working_dir: /workspace
    depends_on:
      - api
    networks:
      - dashboard-power-bi-demo

  redis:
    image: redis:7.4-alpine
    container_name: dashboard-power-bi-redis-demo
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-power-bi-demo

networks:
  dashboard-power-bi-demo:
    driver: bridge
