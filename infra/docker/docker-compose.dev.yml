services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: dashboard-power-bi-api-dev
    command: pnpm --filter @dashboard-power-bi/api dev
    env_file:
      - ../env/.env.example
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3001}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ../..:/workspace
      - api_node_modules:/workspace/node_modules
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dashboard-power-bi-dev

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    container_name: dashboard-power-bi-web-dev
    command: pnpm --filter @dashboard-power-bi/web dev
    env_file:
      - ../env/.env.example
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ../..:/workspace
      - web_node_modules:/workspace/node_modules
    working_dir: /workspace
    depends_on:
      - api
    networks:
      - dashboard-power-bi-dev

  redis:
    image: redis:7.4-alpine
    container_name: dashboard-power-bi-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-power-bi-dev

networks:
  dashboard-power-bi-dev:
    driver: bridge

volumes:
  api_node_modules:
  web_node_modules:
  redis_data:
