services:
  api:
    image: ${GHCR_NAMESPACE:-ghcr.io/devruidiniz}/dashboard-power-bi-api:${IMAGE_TAG:-main}
    container_name: dashboard-power-bi-api
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - '3001'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dashboard-power-bi

  web:
    image: ${GHCR_NAMESPACE:-ghcr.io/devruidiniz}/dashboard-power-bi-web:${IMAGE_TAG:-main}
    container_name: dashboard-power-bi-web
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    expose:
      - '3000'
    depends_on:
      - api
    networks:
      - dashboard-power-bi

  redis:
    image: redis:7.4-alpine
    container_name: dashboard-power-bi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-power-bi

  nginx:
    image: nginx:1.27-alpine
    container_name: dashboard-power-bi-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '${NGINX_PORT:-8082}:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dashboard-power-bi

networks:
  dashboard-power-bi:
    driver: bridge

volumes:
  redis_data:
